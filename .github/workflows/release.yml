name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - '**/test/**'
      - '**/tests/**'
      - '**/test_*.v'
      - '**/*_test.v'
      - '**/*.md'
      - '.github/**'
      - '!**/release.yml'

permissions:
  contents: write

env:
  PROJECT_NAME: pueue-mcp

jobs:
  build:
    strategy:
      matrix:
        target: [linux-x86_64, darwin-x86_64, darwin-arm64, windows-x86_64]
        include:
          - target: windows-x86_64
            os: windows-latest
            bin_ext: .exe
          - target: linux-x86_64
            os: ubuntu-latest
          - target: darwin-x86_64
            os: macos-latest
            vflags: -d cross_compile_macos_x86_64
          - target: darwin-arm64
            os: macos-latest
            vflags: -d cross_compile_macos_arm64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        id: compile
        env:
          VFLAGS: ${{ matrix.vflags }}
        shell: bash
        run: |
          v -o pueue-mcp${{ matrix.bin_ext }} main.v
          if [[ "${{ matrix.os }}" != "macos-latest" ]]; then
            strip --strip-unneeded ./pueue-mcp${{ matrix.bin_ext }} 2>/dev/null || true
            strip --discard-all ./pueue-mcp${{ matrix.bin_ext }} 2>/dev/null || true
          fi

      - name: Create artifact
        env:
          ARTIFACT_NAME: ${{ env.PROJECT_NAME }}-${{ matrix.target }}
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip ${ARTIFACT_NAME}.zip ./pueue-mcp${{ matrix.bin_ext }}
          else
            zip ${ARTIFACT_NAME}.zip ./pueue-mcp${{ matrix.bin_ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          ARTIFACT_NAME: ${{ env.PROJECT_NAME }}-${{ matrix.target }}
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.PROJECT_NAME }}
          merge-multiple: true

      - name: Update nightly tag
        if: github.ref_type != 'tag'
        uses: richardsimko/update-tag@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly

      - name: Generate development release body
        if: github.ref_type != 'tag'
        id: generate_body
        shell: bash
        run: |
          now=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "BODY=Generated on $now from commit ${{ github.sha }}." >> "$GITHUB_OUTPUT"

      - name: Release development version
        if: github.ref_type != 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.PROJECT_NAME }}/*
          tag: nightly
          body: ${{ steps.generate_body.outputs.BODY }}
          name: pueue-mcp development build
          allowUpdates: true
          prerelease: true

      - name: Release latest version
        if: github.ref_type == 'tag'
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.PROJECT_NAME }}/*
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
